appId: com.shuvix.app
productName: ShuviX
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: resources/pyodide-wheels
    to: pyodide-wheels
asarUnpack:
  - resources/**
  - out/main/pythonWorker.js
  - out/main/sqlWorker.js
  - out/main/chunks/**
  - node_modules/@vscode/ripgrep/**
  - node_modules/pyodide/**
  - node_modules/@electric-sql/pglite/**
  - node_modules/whisper-cpp-node/**
  - node_modules/@whisper-cpp-node/**
# 启用原生模块重新编译（better-sqlite3 等）
npmRebuild: true
# 从源码编译原生模块，避免 prebuild-install 下载的预编译二进制依赖更高版本 GLIBC
buildDependenciesFromSource: true
# macOS 无开发者证书时，afterPack 钩子 fallback 到 ad-hoc 签名
afterPack: build/afterPack.cjs
win:
  executableName: shuvix
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  artifactName: ${name}-${version}-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # 公证由 CI workflow 单独步骤处理（支持重试），此处关闭 electron-builder 内置公证
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  icon: build/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  maintainer: wangdongdongc
  category: Utility
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
deb:
  artifactName: ${name}-${version}-${arch}.${ext}
publish:
  provider: github
  owner: wangdongdongc
  repo: ShuviX
  releaseType: prerelease
